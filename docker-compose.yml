services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=lambda,apigateway,iam,sts,ssm,secretsmanager,kms,logs,cloudwatch
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  traefik:
    image: traefik:3.6
    container_name: traefik
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic

  traefik-config-generator:
    build: ./deploy/traefik-config-generator
    container_name: traefik-config-generator
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./deploy/traefik/dynamic:/traefik/dynamic

volumes:
  localstack_data:
